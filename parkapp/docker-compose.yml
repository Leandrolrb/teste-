services:
  # =============================================
  # BANCO DE DADOS - PostgreSQL + PostGIS
  # =============================================
  db:
    image: postgis/postgis:16-3.4
    container_name: parkapp_db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =============================================
  # CACHE / BROKER - Redis
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: parkapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================
  # BACKEND - Django REST API
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkapp_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =============================================
  # FRONTEND - React (Vite)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parkapp_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # =============================================
  # WORKER - Celery (tarefas em background)
  # =============================================
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkapp_celery
    env_file: .env
    command: celery -A parkapp worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
